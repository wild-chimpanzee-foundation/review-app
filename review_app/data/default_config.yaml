# Default configuration for the review app
db_filename: review_data.db
db_dir: ""

# Species and behavior configuration
behavior_defaults:
  - does_not_react
  - reacts_to_camera

# Manual review defaults
annotator_name: default
blank_threshold: 0.75
species_threshold: 0.75

# Playback settings
dark_mode: true
language: en
autoplay: true
muted: false
auto_transcode: true
playback_speed: 1.0x
