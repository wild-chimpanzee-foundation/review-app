# Default configuration for the review app
db_filename: review_data.db
video_dir: ""
db_dir: ""

# Species and behavior configuration
# species_csv_path: ""  # If empty, uses bundled species.csv
species_behaviors_csv_path: "" # If empty, returns empty behaviors list
species_csv_mode: override # override or append
species_behaviors_csv_mode: override # override or append
behavior_defaults:
  - does_not_react
  - reacts_to_camera

# Manual review defaults
annotator_name: default
blank_threshold: 0.75
species_threshold: 0.75

# Playback settings
dark_mode: true
language: en
autoplay: true
muted: false
auto_transcode: true
playback_speed: 1.0x
