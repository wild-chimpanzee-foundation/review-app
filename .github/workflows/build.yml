name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        shell: bash
        run: uv run pyinstaller video_annotation.spec --clean

      - name: Show dist contents
        shell: bash
        run: find dist -maxdepth 3 -print || true

      - name: Archive artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG: ${{ steps.vars.outputs.tag || github.event.inputs.tag || 'dev' }}
        run: |
          src="dist/VideoAnnotation"
          archive="dist/VideoAnnotation-${{ matrix.name }}-${TAG}.tar.gz"
          if [ -d "$src" ]; then
            tar -czf "$archive" -C dist VideoAnnotation
          else
            echo "ERROR: Expected directory not found at $src"
            exit 1
          fi

      - name: Archive artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ steps.vars.outputs.tag || github.event.inputs.tag || 'dev' }}
        run: |
          $src = "dist\VideoAnnotation"
          $archive = "dist\VideoAnnotation-${{ matrix.name }}-$env:TAG.zip"
          if (Test-Path $src) {
            Compress-Archive -Path $src -DestinationPath $archive
          } else {
            Write-Error "ERROR: Expected directory not found at $src"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoAnnotation-${{ matrix.name }}
          path: dist/VideoAnnotation-${{ matrix.name }}-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: ${{ steps.cliff.outputs.content }}
          files: |
            artifacts/**/VideoAnnotation-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
