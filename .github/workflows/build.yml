name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build"
        required: false
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            ext: ""
          - os: windows-latest
            name: windows
            ext: ".exe"
          - os: macos-latest
            name: macos
            ext: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pip install pyinstaller
          uv run pyinstaller video_annotation.spec --clean

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          uv run pip install pyinstaller
          uv run pyinstaller video_annotation.spec --clean

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          uv run pip install pyinstaller
          uv run pyinstaller video_annotation.spec --clean

      - name: List dist output
        shell: bash
        run: find dist/ -type f || echo "dist/ is empty or missing"

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG: ${{ steps.vars.outputs.tag || github.event.inputs.tag || 'dev' }}
        run: |
          if [ -f "dist/VideoAnnotation/VideoAnnotation" ]; then
            mv "dist/VideoAnnotation/VideoAnnotation" "dist/VideoAnnotation-${{ matrix.name }}-${TAG}${{ matrix.ext }}"
          else
            echo "ERROR: Expected binary not found at dist/VideoAnnotation/VideoAnnotation"
            exit 1
          fi

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ steps.vars.outputs.tag || github.event.inputs.tag || 'dev' }}
        run: |
          $src = "dist/VideoAnnotation/VideoAnnotation.exe"
          $dst = "dist/VideoAnnotation-${{ matrix.name }}-$env:TAG${{ matrix.ext }}"
          if (Test-Path $src) {
            Move-Item $src $dst
          } else {
            Write-Error "ERROR: Expected binary not found at $src"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoAnnotation-${{ matrix.name }}
          path: dist/VideoAnnotation-${{ matrix.name }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/*/VideoAnnotation*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
